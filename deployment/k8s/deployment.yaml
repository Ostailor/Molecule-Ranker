apiVersion: apps/v1
kind: Deployment
metadata:
  name: molecule-ranker-server
  labels:
    app: molecule-ranker
    component: server
    app.kubernetes.io/version: "2.4.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: molecule-ranker
      component: server
  template:
    metadata:
      labels:
        app: molecule-ranker
        component: server
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: molecule-ranker-artifacts
        - name: storage
          persistentVolumeClaim:
            claimName: molecule-ranker-storage
        - name: projects
          persistentVolumeClaim:
            claimName: molecule-ranker-projects
      containers:
        - name: server
          image: molecule-ranker:2.4.0
          imagePullPolicy: IfNotPresent
          args: ["web"]
          ports:
            - name: http
              containerPort: 8765
          env:
            - name: MOLECULE_RANKER_HOSTED
              value: "true"
            - name: MOLECULE_RANKER_HOST
              value: "0.0.0.0"
            - name: MOLECULE_RANKER_PORT
              value: "8765"
            - name: MOLECULE_RANKER_ALLOW_PUBLIC_BIND
              value: "true"
            - name: MOLECULE_RANKER_ROOT
              value: /data/projects
            - name: MOLECULE_RANKER_ARTIFACT_ROOT
              value: /data/artifacts
            - name: MOLECULE_RANKER_STORAGE_ROOT
              value: /data/storage
            - name: MOLECULE_RANKER_EXTERNAL_WRITES_ENABLED
              value: "false"
            - name: MOLECULE_RANKER_ENABLE_CODEX_WORKER
              value: "false"
            - name: MOLECULE_RANKER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: molecule-ranker-secrets
                  key: auth-secret
            - name: MOLECULE_RANKER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: molecule-ranker-secrets
                  key: database-url
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
            - name: storage
              mountPath: /data/storage
            - name: projects
              mountPath: /data/projects
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: molecule-ranker-worker
  labels:
    app: molecule-ranker
    component: worker
    app.kubernetes.io/version: "2.4.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: molecule-ranker
      component: worker
  template:
    metadata:
      labels:
        app: molecule-ranker
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: molecule-ranker-artifacts
        - name: storage
          persistentVolumeClaim:
            claimName: molecule-ranker-storage
        - name: projects
          persistentVolumeClaim:
            claimName: molecule-ranker-projects
      containers:
        - name: worker
          image: molecule-ranker:2.4.0
          imagePullPolicy: IfNotPresent
          args: ["worker"]
          env:
            - name: MOLECULE_RANKER_HOSTED
              value: "true"
            - name: MOLECULE_RANKER_ROOT
              value: /data/projects
            - name: MOLECULE_RANKER_ARTIFACT_ROOT
              value: /data/artifacts
            - name: MOLECULE_RANKER_STORAGE_ROOT
              value: /data/storage
            - name: MOLECULE_RANKER_EXTERNAL_WRITES_ENABLED
              value: "false"
            - name: MOLECULE_RANKER_ENABLE_CODEX_WORKER
              value: "false"
            - name: MOLECULE_RANKER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: molecule-ranker-secrets
                  key: database-url
          volumeMounts:
            - name: artifacts
              mountPath: /data/artifacts
            - name: storage
              mountPath: /data/storage
            - name: projects
              mountPath: /data/projects
          readinessProbe:
            exec:
              command: ["molecule-ranker", "db", "check", "--database-url", "$(MOLECULE_RANKER_DATABASE_URL)"]
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          livenessProbe:
            exec:
              command: ["molecule-ranker", "worker", "--help"]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
