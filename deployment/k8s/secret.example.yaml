apiVersion: v1
kind: Secret
metadata:
  name: molecule-ranker-secrets
type: Opaque
stringData:
  MOLECULE_RANKER_HOSTED: "true"
  MOLECULE_RANKER_AUTH_SECRET: "replace-with-long-random-auth-secret"
  MOLECULE_RANKER_DATABASE_URL: "postgresql+psycopg://molecule_ranker:replace-with-db-password@postgres.example.internal:5432/molecule_ranker"
  MOLECULE_RANKER_ENABLE_CODEX_WORKER: "false"
