{% extends "base.html" %}
{% block content %}
<header class="page-heading"><h1>Users</h1></header>
<table>
  <thead><tr><th>Email</th><th>Name</th><th>Active</th><th>Admin</th><th>Provider</th></tr></thead>
  <tbody>
    {% for item in users %}
      <tr>
        <td>{{ item.email }}</td>
        <td>{{ item.display_name or "" }}</td>
        <td>{{ item.is_active }}</td>
        <td>{{ item.is_admin }}</td>
        <td>{{ item.auth_provider }}</td>
      </tr>
    {% else %}
      <tr><td colspan="5">No users.</td></tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
