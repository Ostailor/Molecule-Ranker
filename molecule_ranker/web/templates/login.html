<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login · molecule-ranker</title>
  <link rel="stylesheet" href="/static/dashboard/dashboard.css?v=1.3.0-structure-ui3">
</head>
<body>
  <main class="login">
    <section class="login-card">
      <h1>molecule-ranker</h1>
      <p class="muted">Hosted internal research platform.</p>
      <p class="research-disclaimer">
        Research use only. No medical advice, dosing, synthesis instructions, or lab protocols.
      </p>
      {% if error %}
        <p class="warning">{{ error }}</p>
      {% endif %}
      <form method="post" action="/login">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="button" type="submit">Login</button>
      </form>
    </section>
  </main>
</body>
</html>
