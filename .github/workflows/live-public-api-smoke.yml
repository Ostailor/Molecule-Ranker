name: Live public API smoke

on:
  workflow_dispatch:
    inputs:
      timeout_seconds:
        description: Short timeout for each public adapter health check.
        required: true
        default: "10"

permissions:
  contents: read

jobs:
  live-public-api-smoke:
    name: Live public API smoke
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --all-groups --frozen

      - name: Run live public API health checks
        run: uv run molecule-ranker health --timeout "${{ inputs.timeout_seconds }}"
